- date: 2025-12-25
  title: "Explainable Transformer-CNN Fusion for Noise-Robust Speech Emotion Recognition"
  authors: "Sudip Chakrabarty, Pappu Bishwas, Rajdeep Chatterjee"
  tags:
    - research
    - publication
    - speech emotion recognition
    - explainable ai
  content: |
    Speech Emotion Recognition (SER) systems often suffer substantial performance degradation when exposed to unpredictable acoustic interference in real-world environments. In addition, the limited interpretability of deep neural architectures restricts their deployment in trust-sensitive applications.

    This paper proposes a Hybrid Transformer-CNN framework that combines the contextual sequence modeling capability of wav2vec 2.0 with the spectral robustness of one-dimensional Convolutional Neural Networks. The dual-stream architecture simultaneously processes raw speech waveforms to capture long-range temporal dependencies while extracting complementary handcrafted acoustic descriptors, including MFCC, Zero Crossing Rate (ZCR), and Root Mean Square Energy (RMSE), through a custom Attentive Temporal Pooling mechanism.

    Extensive validation was conducted across four benchmark emotional speech datasets: RAVDESS, TESS, SAVEE, and CREMA-D. To rigorously assess environmental robustness, the model was additionally evaluated under non-stationary acoustic interference using real-world noise profiles collected from the SAS-KIIT dataset.

    Experimental results demonstrate strong generalization capability and state-of-the-art classification accuracy across all evaluated datasets, consistently outperforming single-branch baselines under realistic noisy conditions.

    To address model interpretability, SHAP and Score-CAM were integrated into the evaluation framework. These explainability tools provide fine-grained visual evidence showing how the proposed architecture dynamically reallocates attention between temporal and spectral representations, thereby maintaining reliable emotion discrimination under complex environmental noise.

- date: 2019-05-09
  title: "A scalable framework for evaluating multiple language models through cross-domain generation and hallucination detection"
  authors: "Sorup Chakraborty, Rajesh Chowdhury, Sourov Roy Shuvo, Rajdeep Chatterjee, Satyabrata Roy"
  tags:
    - research
    - publication
  content: |
    Large language models (LLMs) have significantly advanced in recent years, greatly enhancing the capabilities of retrieval-augmented generation (RAG) systems. However, challenges such as semantic similarity, bias/sentiment, and hallucinations persist, especially in domain-specific applications.
    
    This paper introduces MultiLLM-Chatbot, a scalable RAG-based benchmarking framework designed to evaluate five popular LLMs: GPT-4-Turbo, CLAUDE-3.7-Sonnet, LLAMA-3.3-70B, DeepSeek-R1-Zero, and Gemini-2.0-Flash across five domains: Agriculture, Biology, Economics, Internet of Things (IoT), and Medical. Fifty peer-reviewed research papers (10 per domain) were used to generate 250 standardized queries, resulting in 1,250 model responses.
    
    Texts from PDFs were extracted using PyPDF2, segmented to preserve factual coherence, embedded with sentence-transformer models, and indexed in Elasticsearch for efficient retrieval. Each response was analyzed across 4 dimensions: cosine similarity for semantic similarity, VADER sentiment analysis for sentiment detection, TF-IDF scoring, and named entity recognition (NER) for hallucination identification and factual verification.
    
    A composite scoring scheme aggregates these metrics to rank model performance. Experimental results show LLAMA-3.3-70B as the overall best-performing model, leading in all 5 domains. The proposed framework is implemented using Colab notebooks, which offer a reproducible, extensive pipeline for domain-specific LLM benchmarking.
    
    Through the combination of cross-domain analysis and multi-metric evaluation, this study fills in the gaps in current LLM benchmarking procedures and offers a modular architecture that can be adjusted to new domains and future LLM advancements. The findings inform model selection strategies for researchers and practitioners seeking trustworthy LLM deployment across diverse industrial and scientific sectors.
